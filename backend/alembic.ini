[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Uses sync driver — set via env override in env.py
sqlalchemy.url = postgresql+psycopg2://dawahadmin:amine2026!Secure#PG@islamic-dawah-db-amine.postgres.database.azure.com:5432/dawah_db?sslmode=require
[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
